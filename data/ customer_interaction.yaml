    question: "Для чого призначена підсистема CSS в рамках автоматизації корпоративного управління?"
    options: ["Автоматизація служби підтримки та обслуговування", "Автоматизація діяльності Sales Managers", "Автоматизація маркетингу", "Створення стилів для вебсторінок"]
