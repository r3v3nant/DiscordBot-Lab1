  - id: 12
    question: "Що пропонується зробити клієнту, якщо в отриманих meeting notes є помилки?"
    options: ["Зателефонувати директору", "Надіслати листа для виправлення", "Створити завдання в Jira", "Залишити коментар у Confluence"]
